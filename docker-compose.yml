services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
    container_name: pokerbot-app
    init: true
    restart: unless-stopped
    ports:
      - '4892:4892'
    env_file:
      - .env
    volumes:
      - sqlite_data:/data

volumes:
  sqlite_data:
